name: Run CUDA Kernel on Colab

on:
  push:
    branches: [main]
    paths:
      - "kernels/**.cu"

jobs:
  run-cuda:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT }}

      - name: Find changed .cu file
        id: changed
        run: |
          CU_FILE=$(git diff --name-only HEAD~1 HEAD -- 'kernels/*.cu' | head -1)
          if [ -z "$CU_FILE" ]; then
            echo "No .cu file changed — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "cu_file=$CU_FILE" >> $GITHUB_OUTPUT
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Found changed kernel: $CU_FILE"
          fi

      - name: Setup Python
        if: steps.changed.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.changed.outputs.skip == 'false'
        run: pip install -r requirements.txt

      - name: Post "running" comment
        if: steps.changed.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `⏳ **CUDA kernel queued**\n\nKernel: \`${{ steps.changed.outputs.cu_file }}\`\nWaiting for Colab GPU executor to pick up the job...`
            });

      - name: Submit job and wait for results
        if: steps.changed.outputs.skip == 'false'
        id: run
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          CU_FILE: ${{ steps.changed.outputs.cu_file }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NOTEBOOK_ID: ${{ secrets.NOTEBOOK_ID }}
        run: |
          python trigger_colab.py \
            --cu-file "$CU_FILE" \
            --sha "$COMMIT_SHA" \
            --timeout 600 \
            --output-file results.txt

      - name: Post results as commit comment
        if: steps.changed.outputs.skip == 'false' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const fs = require('fs');
            const cuFile = '${{ steps.changed.outputs.cu_file }}';
            let body;

            try {
              const results = fs.readFileSync('results.txt', 'utf8').trim();
              const success = !results.startsWith('ERROR');
              const icon = success ? '✅' : '❌';
              body = [
                `${icon} **CUDA Kernel Results**`,
                ``,
                `**Kernel:** \`${cuFile}\``,
                `**Commit:** \`${context.sha.slice(0,8)}\``,
                ``,
                `\`\`\``,
                results,
                `\`\`\``
              ].join('\n');
            } catch (e) {
              body = `❌ **CUDA Kernel Failed**\n\nNo results file found. Check the [workflow logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`;
            }

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: body
            });
